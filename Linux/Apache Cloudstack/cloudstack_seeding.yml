- name: Create temporary mount point for seeding
      file:
        path: /mnt/secondary
        state: directory

    - name: Mount Secondary Storage NFS
      mount:
        path: /mnt/secondary
        src: "192.168.1.10:/export/secondary"
        fstype: nfs
        state: mounted

    - name: Seed System VM Template (KVM)
      shell: >
        /usr/share/cloudstack-common/scripts/storage/secondary/cloud-install-sys-tmplt
        -m /mnt/secondary
        -u http://download.cloudstack.org/systemvm/4.19/systemvmtemplate-4.19.0-kvm.qcow2.bz2
        -h kvm
        -F
      args:
        creates: /mnt/secondary/template/tmpl/1/3/template.properties

    - name: Unmount Secondary Storage
      mount:
        path: /mnt/secondary
        state: unmounted