---
- name: Check if Eclipse systemd services are running and start them if not
  hosts: eclipse_prod
  become: yes  # Required for managing systemd services

  vars:
    # Define a list of service names you want to check and start
    target_services:
      - eclipse-system-admin.service
      - eclipse-jboss.service
      - eclipse-reports-jboss.service
      - Galaxy.service
      - universe.service
      - httpd.service

  tasks:
    - name: Start services if they are not running
      ansible.builtin.systemd_service:
        name: "{{ item }}"
        state: started
        enabled: yes # Ensures the service starts on boot
      loop: "{{ target_services }}"
      # The task will report "changed" only if a service needed to be started or enabled.