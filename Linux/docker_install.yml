---
- name: Install Docker and Docker Compose
  hosts: all
  become: true
  vars:
    # The user to be added to the docker group.
    # Using 'ansible_user' will add the user you're connecting with.
    # You can change this to a specific username.
    target_user: "{{ ansible_user }}"

  tasks:
    - name: 1. Update apt package index and install prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true
      tags: [docker]

    - name: 2. Create directory for Docker's GPG key
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      tags: [docker]

    - name: 3. Add Docker's official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'
        force: true
      tags: [docker]

    - name: 4. Add the Docker repository to Apt sources
      ansible.builtin.apt_repository:
        repo: >
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_lsb.codename }} stable
        state: present
        filename: docker
      tags: [docker]

    - name: 5. Install Docker Engine and Docker Compose
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin # This is the current 'docker compose' command
        state: present
        update_cache: true
      tags: [docker]

    - name: 6. Ensure Docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      tags: [docker]

    - name: 7. Add target user to the 'docker' group
      ansible.builtin.user:
        name: "{{ target_user }}"
        groups: docker
        append: true
      tags: [docker, user]
      notify: Reset SSH connection # Required for group change to take effect

  handlers:
    - name: Reset SSH connection
      ansible.builtin.meta: reset_connection